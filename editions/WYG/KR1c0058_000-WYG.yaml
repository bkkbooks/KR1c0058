body:
  text: 詩經劄記詩類提要臣等謹案詩經劄記一卷國朝楊名時撰名時有周易劄記已著録是編乃其讀詩所記大抵以李光地詩所為宗而斟酌於小序朱傳之間其論闗雎從小序求賢之説最為明允其論鄭風不盡淫詩而聖人亦兼存淫詩以示戒論亦持平至謂鄭聲即鄭詩力駁鄭樵之説則殊不然淫詩可存以示戒未有以當放之淫聲被之管弦可以示戒者也至詩所論季札觀樂所陳皆西周之詩非東遷以後之詩名時據變風終於陳靈在宣公十年至襄公二十九年呉子使札來聘已越五十五年又引左傳卿大夫所賦以見東遷以後之詩列國具備其文絶不囘䕶其師説可謂破除講學家門户之見又十月之交一篇論辛卯日食則云應問於知歴者殷武一章於朱子始祔而祭之説則云更宜考定亦不强不知以為知惟二雅諸篇頗有臆斷然如論國語弔二叔之不咸引富辰所云封建親戚藩屏周者首舉管蔡郕霍知二叔不為管蔡引禮記月三五而盈證三五在東引周禮祭天地三辰皆有奉璋之禮辨朱傳之專指宗廟引月令節嗜慾及集韻嗜字注解上帝耆之引大司樂享先妣之文在享先祖之上證大雅魯頌所以止稱姜嫄引儀禮下管新宫在宣王之前證新宫非斯干亦皆具有考據於其師説可謂有所𤼵明矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ff5feed1d4412590ffe7641d7e74750e0588107ec3d76b6b04e3acbcd0b5c216
