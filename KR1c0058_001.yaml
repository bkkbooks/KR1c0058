body:
  text: 詩經劄記禮部尚書總理國子監事楊名時撰讀大序則知詩之教是從人之心志上養其善端消其邪惡以為美政教之本風如風之動物也此即興起人善端蕩散人邪慝之義關雎小序言后妃進賢為后妃之德義大而精程朱皆不取何也大臣之職莫大於求賢才以佐朝廷之治后妃之職莫大於與賢淑共成宫閫之化后妃求淑女此德之所以為至味此詩殆后妃所自作歟或疑好逑唯后妃可稱彼兔罝武夫尚可云公侯好逑豈夫人嬪御之倫不得稱耶小序所謂憂在進賢其説蓋有所受矣或疑古之取女夫人嬪御早有定數不待於求然此常禮也而聖哲好賢求輔之心則有不可以尋常論者后妃自視欿然直有已德不足以配君子之懼果有德勝己者即避位中宫屈已下之亦無所難耳故曰是詩也與虞書明明揚側陋之義同也説文采捋取也爾雅釋言芼搴也注皆擇菜也桃夭是化行於國中所謂之子或係卿大夫家女或係民間女宜其家室李文貞公詩所云必能與其類相和按其類謂媵御之同居室者禮記云三五而盈古詩云三五明月滿三五是月望時月光滿則星光為之奪今小星嘒然在東是不為月掩矣舒而脫脫言如玉之女容止安間而脫然有清潔之操也列國之風在西周時者世數相隔既逺未若東遷以來見聞親切尤足示勸懲也且人倫之變政教之衰莫甚於東遷後百年之間夫子刪詩略逺詳近或以是歟李文貞公謂季札所觀大約多西周時之風若東遷後列國之風魯安得備之今夫子所刪存者如邶風柏舟緑衣是西周時詩燕燕以下無明證者難指定為莊薑詩論誠當矣竊意東遷後列國之風魯所以得備者亦有説東遷後列國名卿學士輩留心禮樂典章兼通當世之務者類不乏人平日則互相咨訪以廣見聞及出使則賦詩贈答以見志左傳所稱紀者甚繁晉宋齊鄭皆然不獨魯也魯秉周禮崇文教為諸國望於文章風雅之事必尤備焉采輯所得存之史氏掌之太師由來舊矣或謂夫子周流疑亦有采得之詩存於變風中者但古詩三千刪存三百此三千之詩蓋即季札所觀者變風終於陳靈陳靈弒於宣公十年又越五十五年至襄公二十九年而季札觀樂即今所載各國風也是年夫子生七嵗矣又越六十二年夫子年六十八而刪詩則變風非由夫子采得可知但其間或有缺文錯簡夫子從而訂正之耳季札請觀周樂為之歌王文貞公謂何彼穠矣成康時之風也而附于召南之後沔水至無羊西周時西都畿內之風也綿蠻以下西周時東都畿內之風也並皆附於小雅之末至東遷以後卿大夫貴近者所作則列於小雅即節南山諸篇是也士民微者所作則列於王風蓋周太師欲存風雅二體故分列為小雅王風也亦以王室既東故尊貴者之詩不得入於大雅微者之詩不得附於小雅也此論經參訂而定無可易矣至燕燕以下或即是莊薑詩擊鼓或即是州吁時詩蓋夫子刪詩略逺而詳近取其事之在人耳目尤足示勸懲也邪音餘與餘同史記厯書歸邪於終注邪餘分也終閏月也靜女存淫者期會之辭以刺時朱傳之説自與小序首句合新臺夫子言詩曰思無邪曰興於詩曰不學詩無以言曰詩可以興觀羣怨事父事君禮記經解云溫柔敦厚詩教也合而言之詩教只是欲人正其性情粹然無邪惡之雜其初必自興起善端始故使之吟咏諷誦以感觸其好惡之真反觀內省加檢於人倫事物之際久之一切忿戾刻薄邪惡之纍日化而不自知由中達外自有溫柔敦厚之致藹乎其為有德之言矣秉彝好德天下古今之所同無羞惡是非非人也惟在上者徇私縱欲播惡成俗民皆失其正性而知識廉恥盡喪焉豈其本然哉要之此等播惡之人所謂下愚不移者特數千萬人中之一二其餘中人之性是非廉恥固不盡亡也聖賢立教亦以天下古今共由之道率人而已一二元惡大憝所以禁制於未然誅絶於已然者其道固即行乎其間要不出於勸善遏邪之大旨已爾君臣朋友之際每有因睽離而生讒譖者采葛之詩舊説以為懼讒殆未可廢彼者他人代為憂慮之辭丘中有麻古注以為思賢大夫得詩所闡發之覺與甘棠遙應興勸無窮宋儒鄭樵作通志謂鄭聲淫非鄭詩淫也疑朱子説鄭衛詩未是不知詩言志歌永言聲依永律和聲有源有流不相假易安有詩言正而聲律淫者乎此全不知聲音律吕之理者也或又謂夫子所謂鄭聲淫蓋指未刪時之詩而言今詩中所存皆既經刪定者已無有淫詩在內大抵非美即刺此説略為近理然亦未嘗即詩而尋其詞意且不明於作詩之大致也今觀桑中同車及丰之詩皆似其人自作非有刺譏之意安得不謂之淫詩且人之作詩或美或刺或述懷見志若如舊説是專有美刺而無述懷見志之詩也於理亦覺難通唯雞鳴青青子襟野有蔓草詩似未可遽以淫詩斷之蓋夫子未刪詩時鄭衛淫詩不可勝數所謂鄭聲淫正是指此而言後刪詩時已去其十之八九矣然猶存其十之一二而不刪者蓋以著其風俗之惡使人知衛所以亡鄭所以亂也若竟云無淫詩非美即刺豈通論乎且班固云詩有齊魯毛韓而以韓詩為近漢之列於學官者則取齊魯韓之詩鄭康成與毛公同鄉獨注毛詩從此毛詩獨行於世而齊魯韓三詩俱無傳此如春秋三傳其釋經已自不同未可專信一家也今毛詩與三詩各異既難偏信故朱子以理斷之縱其説未必盡得聖人之本旨然視漢之人自為説而於理難通者其孰去孰從不較然可辨乎孔子云多聞闕疑又曰杞宋不足徵也今去聖既逺不以理為折衷而求其至是顧欲輕背前賢之説以遽達於道也亦見其惑矣夫子謂鄭聲淫蓋指蘀兮狡童褰裳等數詩如樂記云桑間濮上之音亡國之音也亦指桑中詩言此二國之詩出於桑濮溱洧間者其聲淫靡非謂鄭衛之詩其聲盡淫也但其國好而習之成俗耳其聲調最足惑人故特戒之為填詞者用哀調則哀用樂調則樂是哀樂係於所用之調也要之心中有哀而以哀詞填入哀調心中有樂而以樂詞填入樂調是哀樂仍生於心也決無欲抒寫好賢樂善勸德規過之心而用莊雅之詞填入淫靡之調者可見詩不淫而聲淫無是理也匪雞則鳴二句俱是賢妃語言若非雞鳴豈天已旦而蒼蠅有聲乎次章云若非東方明豈時尚早而為月出之光乎上意其太晚此又疑其尚未近曉總是驚惻不安於寢之情狀園有桃以下應是東遷後之詩魏不久而淪於晉矣棘叢生多刺其實為小棗園圃多以為藩易云置於叢棘以之拘禁罪人詩人蓋以棘比法令科條之森布間民者皆所以養民衰亂之法則苛虐而已故詩人憂之嗟行之人胡以不比乎人無兄弟胡以不佽乎以非同父故耳此四句只作反問之詞以應不如我同父意羔裘篇言此羔裘而飾以豹之大夫其待人傲慢苛刻非獨於他人然也自我人而亦居居然慢以待之究究然苛以待之我豈無他人而必於子乎亦維與子為故舊夙好誼不可違棄耳夫以有故舊夙好之誼者而猶待之若此則其無禮不仁可知而詩人乃顧念舊好終不忍背離此唐風之厚也詩所解素冠云與上篇一類素衣素冠者羔裘狐裘之反也庶得見此人者而與之同歸傷俗之甚也案浮靡偷薄之俗惟返朴尚質乃可救之舍是無先矣素衣素冠素鞸之思即易白賁之旨匪風作於將東遷時懷之好音以善言贈之而納置其懷也東山次章言軍士之未有室家者室廬荒廢之狀三章言軍士之已有室家者思念喜慰之情四章則分承其意而結言之當日周公遇流言之變若退避居東三監挾武庚為亂東方囂然不靜逼近京邑王室有岌岌之勢安得待至二年後始往征耶公以懿親叔父當國義不得避嫌養禍倘有避嫌之見則負扆之事應先避矣伊尹周公所處難以常論通經達權理勢自應然耳且罪人斯得之云若但云得其主名度二叔之情形未必須二年之後始露也二年而擒獲罪人三年而後歸只是一畨事非居東二年而迎歸又東征三年而歸也觀豳風東征在前伐柯三篇在後可知文貞公謂四始皆始於文王誠不易之論至天保則武王以後詩也鴻雁雖流民所作然關於中興美政與庭燎俱為宣王詩可無疑也沔水鶴鳴朋友規勸之詩祈父軍士怨苦之詩白駒則賢人逺遁黃鳥我行其野則政散民流無以為國矣此六篇並西周畿內夷厲以降之風謡也斯干乃公卿作室落成之詩無羊則美牧人善職之詩此二篇應屬宣王之世西周之風止此幽在位十一年淫昏速禍具於瞻卬召旻小辨白華西畿之風不具録也按沔水以下諸篇勸戒之義深世變之迹具末繫以頌禱之章致意於蕃育嘉祥豐和徵兆蓋天運人事往復循環聖人望治之心寓於刪敘矣沔水以下至無羊大抵係周道既衰西周畿內風謡或為夷厲以前或在夷厲以後難強分也又或俱為宣王時亦未可知以其音節近小雅故附於宣王變小雅之後蓋畿內正風如何彼穠矣作於成康之世召公輔政時所得者已入於召南其後風謡有無甚關於勸懲大義者夫子悉刪之略存數篇而聖學之淵源流貽者長王澤之衰竭由來者漸已具見於此矣黃鳥我行其野斯干無羊若俱為宣王之詩則是因政荒民散關於王業之衰替者重宫室畜牧之事在所輕以為敘也又不以作之在上者居先作之民間者居後為例矣正如鴻雁亦民間風謡以其係於王業中興之本故居庭燎之前皆重民之義巷伯乃宫禁近臣之屬而被讒所關大矣谷風朋友相責之詩蓼莪孝子自責之詩關於倫誼之大列之於此知非微者之作北山無將大車小明三篇行役大夫之作與上大東四月二篇俱非微者又音節係雅體故與節南山諸篇並編入東遷後小雅也若黍離作於行役或係王臣之卑者所作且按王風諸篇已有無復可為之歎矣與東遷後入於小雅諸詩神情音調俱迥别周太師别為王風有以夫楚茨諸篇小序皆以為陳古刺今見其繫於鼓鐘之後故耳實則諸篇絶不見其為刺也朱子闢之卓矣常棣文武時燕兄弟之詩周公所作序謂文武以天保以上治內是也管叔以殷畔在周公相成王朝諸侯之後説者謂死喪之威指管蔡之事豈周公作此詩於成王時遂用以燕兄弟而廢文武時所用之詩與恐不然也且管蔡所謂悖理亂常公誅之出於萬不得已上傷文考寧王之心下為終身莫釋之憾乃以此施于燕同姓兄弟之時定為樂章咏歌不置揆諸情理之安益多未協左傳富辰云昔周公弔二叔之不咸故封建親戚以蕃屏周管蔡郕霍魯衛毛𥅆郜雍曹滕畢原酆郇文之昭也𨝍晉應韓武之穆也凡蔣邢茅胙祭周公之胤也召穆公思周德之不類故糾合宗族於成周而作詩曰常棣之華鄂不韡韡凡今之人莫如兄弟其四章曰兄弟鬩于墻外禦其侮漢儒以二叔不咸謂指夏商之叔世文貞公以為其説近是觀所謂弔二叔不咸而封建以管蔡為首則二叔為指二代之衰信矣至富辰以此詩為召穆公作孔氏云賦詩者或造篇或誦古穆公厲王時兄弟恩疏重歌此周公之詩以親之耳玩此則常棣為周公作於文武之世無疑且頍辨亦以死喪為言蓋同生膝下而雕榮枯菀先後久暫互有不齊人生天性之感莫此為切故輒及之下章云和樂且孺追其始也此言死喪孔懷要其終也始者其本也終者其歸也一念其初生復思其終竟則人欲消而天理現矣語及此而不憬然醒悟無是人也小序謂常棣周公閔管蔡之失道於魚麗則謂文武以天保以上治內采薇以下治外文貞先生云文武時燕兄弟必有詩不應至成王時乃有常棣篇當是未誅管蔡以前作按頍辨篇末言死喪無日無幾相見此篇之首即及死喪孔懷原隰相求之事乃家庭骨肉相聚天性激發至情流溢不覺矢口直攄胸臆為此深痛悲切之言所以覺悟薄俗牖迪良心者於是為至蓋原始反終者道之極致不於明倫敦本時發唱長歌義豈尚有踰於此者乎有酒湑我無酒酤我言有酒則為我而湑無酒則為我而酤也四牡勞使臣而曰我心傷悲此燕兄弟而曰湑我酤我皆代羣臣兄弟為言此盛世君臣一體之誼也至通篇前後語意則仍屬上之自言四牡篇亦不必全作使臣語出車言天子命我是武王以後之詩非文王詩毛鄭皆以天子為紂王為殷王蘇氏轍以采薇三詩皆文王奉紂命伐玁狁王氏安石云天子紂也朱子初亦主此説然此乃周家出師常用之詩豈有歌奉紂命以遣勞之理故朱子於此詩序辨説以天子王命皆為周王乃定論也采薇出車俱言雨雪不必如東萊吕氏分戍畢與在道室家君王為子之嚴君為孫之王考歌哭於斯聚族于斯所謂善頌善禱也平王四十九年入春秋前此四十餘年內或有十月朔遇辛卯日食之事應問於知厯者六章言皇父作都於向皇父內朝卿士向在東都作都於此當是東遷後事孔氏曰節南山篇韋昭以為平王時作謂作在平王之世而上刺幽王今玩十月之交篇歷陳變異殆追述幽末數年間事而歎時之莫懲也幽王之淫昏所謂下愚不移者也平王雖庸暗在東遷之初賢人君子猶望其復振而王不自奮勵公卿大夫亦共狃於目前之安罔知懲警文武之績乃墜於地夫當人心思周之會廢興存亡繫焉不謂甘於慆慢若此詩人所以痛傷而夫子於小雅存録其篇章較多蓋以著王迹之所由熄春秋之所由作俟後世鑒觀而興起云爾豔妻或是謂平王宫中嬪御冶豔蠱君者與外廷交煽為讒慝之事自此至小宛鄭皆以為刺厲王毛作詁訓傳時移其篇第伊誰云從二句言伊從誰處來乃從暴公處而來者此即指暴公但不斥言而婉其詞耳非謂暴公行而此人隨之同行也二人從行王氏肅云二人俱為王卿相隨而行猗于畝丘畝壟也田中髙處闢丘為壟芟除自此始母兮鞠我謂自胞胎中即養之大東言王朝賦煩役重民不堪命雖諸侯之大夫所作而關切於王政故入雅詩一説舟人之子謂操政柄者之子弟私人之子謂姻婭小人但柄政者之子弟而熊羆是裘不為非分矣只以微賤者言之為是唯翕舌故不可以簸揚唯柄揭故不可以挹酌承上而申言其故也疷當作疷祈支邸三音同􅢌民昏二音病而昏也鼓鐘之詩發端言將將未見聲之不善處懷允不忘先從性情本原上説起此立言之序喈喈嘽緩之音蓋流於淫者故思淑人君子之德無邪也代鼛急疾之音蓋失之傷者故思淑人君子之德無尤也甫田首章言省農耘耔而食農之事次章言報賽祈年之事三章申言首章省農而上下相親愛之事四章申言報賽祈年上下交相親愛之事瞻彼洛矣不必指為諸侯所作如魚麗南有嘉魚二篇係歌工之詞蓋東都朝會講武之樂歌彼交匪敖二句言今之燕享相交非為遨遊來也君臣親洽則國運亨昌來此以求萬福之集耳雨雪瀌瀌喻貪競之勢極盛也雨雪浮浮喻涼薄之象充塞也見晛喻陽德之亨也陽德亨則隂慝消王道興則貪戾化矣今爭攘恣行遺親蔑長由上教之得不以為憂乎如髮如其髮之本然不加飾也凡周之士不顯亦世前有周召畢散後有孔顔曽孟非聖人之培育何以致之蒸民之詩道之矣棫朴祭天地山川不祼朱傳祼以圭瓚亞祼以璋瓚乃祭宗廟之禮據此則首章薪槱言祭天地三辰次章奉璋是祭宗廟事按祭天地以蒼璧黃琮及圭祀日月星辰以圭璧禮四方以圭璋琥璜是奉圭璋之禮不獨宗廟也於天地三辰亦有之矣一説末章承上作人言施其追琢之功俾得成其天質之美勉勉即無斁教人不倦之謂玩上言夀考作人則裁成造就教思無窮之意已盡包在內詩所歸之於修德義尤完也思齊篇中言文王之性文王之學文王之取善成物周盡融洽無以加矣上帝耆之嗜好出于性情聖人性與天合故帝耆之也耆集韻音視嗜亦作耆禮月令節耆欲德配天則天立之為配矣配命配帝皆契合無間之謂后稷為周始祖立廟以祀推所自出祀薑嫄於其廟以稷配之據祭法周人禘嚳而郊稷是祀薑嫄並祀嚳矣理自應然但禮記多出周末漢初儒者所撰述當以經為正耳周禮大司樂敘享先妣於享先祖之上先儒據此謂專禘薑嫄周禮為周公所定先言先妣則專禘薑嫄之證也大雅魯頌止稱薑嫄與周禮合踐大人迹而有娠不必以為誕異朱子論之詳矣如感龍漦有娠興亡自有天焉文貞公解履帝武敏歆等句以為從天子祀郊禖步之速而心之動云云依文順解歸於雅馴舊説存而不論蓋不語怪神之旨儒者解經之家法也軷祭行道之神意如今人之祀外神必祀及從行之神如五路神之類后稷祀上帝以祈年祈穀因祭其先路主駕之神與按月令孟冬其祀行此軷祭即冬祀行之祭也后稷祀帝而帝歆之非但芳臭之薦得其時所謂黍稷非馨也由其德克享天心是以上帝歆之所謂明德惟馨也自肇祀以來無罪悔以迄于今莫非后稷之至德所留遺子孫當兢業以承之永世勿替者也歌詠始受命之祖德所以陳戒後王要是於受釐時歌之福祿來成等句舊解似指頌禱公尸説玩爾酒爾殽爾字則自歌工指嗣王言應是歸福于嗣王語意如瞻彼洛矣云君子至止福祿如茨乃自歌工作頌禱語因朝會諸侯而作如鳬鷖則為賔尸而作故諸侯作鴛鴦以答天子公尸作假樂以答嗣王也藩最在外有四逺邊陲之象碩德重望之人華夷咸共傾仰畏憚是為國之藩籬故曰維藩垣限內外垣音袁援也髙曰墉卑曰垣人所依阻以為援衛也天下民衆人主依之以為援衛故曰維垣屏小墻當門中立又罘罳亦曰屏皆以扞外而蔽內者大邦作京師之扞蔽故曰維屏翰者楨幹築牆之所資以立者大宗強族也兼同異姓在內所謂世臣大家與國共休戚安危倚為楨幹故曰維翰此四者懷之以德則安矣至於城乃國之根柢廟社朝市人民財賦莫不匯集於此繫屬於此實神人所憑藉上下所宗主屹然為不可拔之基本故以喻宗子宗子謂君也宗子有德則城固而藩垣屏翰皆固矣蕩首章上帝自詩人而目王也不敢斥王故曰上帝七章上帝謂天帝託為文王語也不嫌于互異訏謨逺猶如大易洪範是也是所以定生人之命而當隨時自警告者定命以立本在於自強辰告以謹幾在於有覺訏謨定命如居則觀其象而玩其辭逺猶辰告如動則觀其變而玩其占文貞公云三章警不能自強者四章警不能有覺者按惟不能自強是以不能有覺肆字承上章言之敬慎威儀即該慎言語在內未有出話不慎而可云能敬慎威儀者顔子四勿曽子三貴俱以動作言語相連説此章言慎爾出話即連敬爾威儀緊接説下謹幾不離主敬慎言不離敬儀言語尤威儀中之最重而易有失者所宜加慎此兩章言慎出話乃謹幾之要後章言不愧屋漏乃主敬之密總攝在敬慎威儀一句中蓋語默動靜無非威儀之發見也所以此篇前後皆主威儀言借曰未知亦既抱子是不過方壯之年也借曰未知亦聿既耄言今雖壯年轉瞬即老也難以此語定為九十有五時所作味詩中語意蓋武公當厲王時年方壯而作此常令人朝夕歌誦以自警至九十有五不因老而廢輟人遂傳為極老所作與靡國不泯無國不泯滅也民靡有黎猶云靡有孑遺也力民代食力於農以代食也韓奕鉤膺馬婁頷有金鉤馬膺有樊有纓彼疏斯稗詩所作荑稗之稗解言彼乃粗糲中之惡種而為稗者也鄙惡之之辭清廟一人倡而三人歎則一句便成四韻相叶故全詩不用叶韻無封靡于爾邦靡滅也周之先公立國于戎翟之間屢為侵逼而不至隕滅所謂無靡也詩所解天作篇云此文王祔祭于太王廟之詩按文王沒後祔於太王廟時太王未有王號意詩句本是古公荒之至周公追王後乃易古公字為太王與周書武城篇武王告諸侯已稱太王王季或文王祔廟時已稱太王與又或得天下後初成七廟時以穆從穆而袝食與太王肇基文王受命或特行並祭之禮未可知也凡孫祔於祖祔祭後仍歸本寢祖以次祧升新主乃入廟初祔必並祭也王釐爾成釐福也王之福爾實成之詩所謂此篇與噫嘻篇皆為雩祭之詩按左傳桓五年龍見而雩注逺為百榖祈膏雨也疏雩之言逺也逺者豫為秋收言意深逺也意者臣工噫嘻二篇祈穀時歌之至龍見後祀赤帝祈雨亦祀從祀后稷之農官而歌此詩與雍是武王既得天下後致祭於文王廟之詩以介眉夀永言保之夀與保叶韻思皇多祜宜連烈文辟公説祜字與末句嘏字叶管象管新宫今詩中無象及新宫詩文貞公謂如笙詩之無詞或謂逸詩如采齊貍首之類本有而今亡矣或云象即武也於皇武王章武周公以象武王武功也成童舞象象舞武舞也明堂位曰下管象朱干玉戚冕而舞大武注云象即周頌武詩以管播之祭統注云吹管而舞武象之樂也按左傳武之卒章武三章賚六章桓不言樂章總數無可考文貞公云大武之詩疑不止於武桓賚酌而已疑大明之詩皆大武樂章意者合諸章為大武朱干玉戚冕而舞之武一章為象則成童所舞與又按左傳昭公二十五年叔孫婼聘宋宋公享之賦新宫昭子賦車舝享之而賦意者如儀禮所謂下管新宫以其聲調人奏與是與答賦賦字異義矣抑新宫本有其辭而逸不傳與至有謂新宫即斯干則慶源輔氏已辨之矣儀禮成於周之盛時不應以夷厲以後之詩入用也又或謂斯干為成王時作亦不足據果成王時詩何得序於黃鳥我行其野後耶新宫之非斯干可知載芟且與且叶今與今叶每句以二字相叶也末句如良耜末節角續為韻而續古之人一句獨韻魯頌有駜篇各章末句俱另韻詩所以絲衣為養老之詩按絲衣爵辨士之祭服也養老之服同王制殷人冔而祭縞衣而養老周人冕而祭玄衣而養老孔氏云爵辨之服玄衣纁裳皆絲為之閟宫魯無后稷文王廟其元日祈穀以稷配天及舉禘時祀文王於周公廟皆是設主迎尸而祭耳按莊公十五年齊桓始霸莊公終三十二年又閔公二年是僖公之立齊桓已霸二十年矣僖十三年淮夷病杞僖會桓于鹹以謀之十五年會桓救徐十六年會齊宋陳衛鄭許邢曹于淮謀鄫且東略也十七年冬十二月小白卒自是齊亂五公子爭立齊遂失霸僖十九年宋襄曹邾盟于曹南宋執滕子嬰齊邾人執鄫子用之次雎之社秋宋圍曹二十一年楚執宋襄以伐宋二十三年宋襄卒二十四年晉文公入國二十五年僖從楚二十八年盟踐土三十二年重耳卒據此推之齊桓沒後宋襄虐小國欲以屬東夷淮徐或乘此時並起侵魯僖曽禦而克之與商頌七篇之亡疑即夫子所刪季札觀樂為之歌頌未嘗别言商周然曰盛德所同固已兼之矣非專指周室諸王也孔父嘉被害於桓二年入春秋已十三年矣加以平王四十八年是東遷以來至此六十一年計孔父嘉之父正考父得商頌時應在東遷前後至孔子刪詩時不及三百年風雅不聞散缺何三千篇中獨商頌失過半耶審此則七篇洵夫子刪之矣周樂凡升歌用琴瑟升歌後笙入卑者以笙尊者以管三終後間歌堂上琴瑟人歌完堂下舉笙相間而歌也三終後堂上堂下合樂衆音備舉而萬舞陳矣堂上彈琴瑟而歌之時擊玉磬以為節奏堂下吹笙管之時擊東階之笙鐘笙磬應之至合樂時西階擊頌鐘頌磬以應歌聲東階擊笙鐘笙磬以應笙管堂上擊玉磬以為歌聲節奏虞書戛擊鳴球搏拊琴瑟以詠下管鞉鼓笙鏞以間即升歌笙入間歌之事商頌鞉管依磬聲蓋合樂時鞉鼓管聲之類與玉磬相依玉磬所以節人聲今衆樂依之見以人聲為重也庸鼓有斁文貞公謂庸即頌也頌鐘頌磬與歌聲應直言頌重人聲也據此則虞書笙鏞鏞字亦與頌通頌音容與容同又音誦儀禮西階之西頌磬注形容成功曰頌西為隂中萬物之所成是以西方鐘磬謂之頌間歌時堂上擊玉磬為人聲節奏疑西階即擊頌鐘頌磬應之頌鐘頌磬不俟合樂始擊唯升歌三終時恐只擊玉磬未擊堂下之鐘磬虞書笙鏞以間或連合樂亦在內又按合樂時堂上人聲與堂下鞉鼓管籥並奏玉磬按節而擊笙鐘笙磬頌鐘頌磬亦並擊而以人聲為主故云依我磬聲是固然也但此章之序先言奏鼓迎神即言鞉鼓管聲之和平依磬聲而贊以穆穆下乃及庸鼓萬舞則次節鞉管之依磬聲而穆穆者尚是升歌終而管入之時未遽及於合樂時也只以文貞公之解為定按升歌笙入間歌合樂周人作樂之序也商人之樂未詳以虞書戛擊鳴球搏拊琴瑟以詠下管鞉鼓等文推之則先升歌而後下管乃合樂而舞其序當亦不殊首節奏鼓在未迎牲前乃未升歌時也次節鞉管則祭時所奏或疑武丁恐是殁後之號玩在武丁孫子之云似非追溯語意如沃丁小甲仲壬陽甲廩辛之類皆以天干紀號蓋生時即所共稱舉者殷武為宗者親盡不祧當親未盡時其主原祀之於昭穆之廟及親盡當祧時則别立廟以祀而不祧毁殷之三宗周之文武是也髙宗若至應祧時乃立廟去殷亡不逺若殁後未至應祧先立廟則主已祔于昭穆之廟豈另立神位以祀之與朱傳云特為百世不遷之廟既成始祔而祭之之詩按祔者孫祔于祖也祔在喪將除之先既云祔則非特立廟矣祔祭後舊主以次升遷修廟而新主入焉祔祭時舊主在廟尚未修也祔祭後新主仍歸暫安奉處至廟既修而入不稱祔矣更宜考定詩經劄記
